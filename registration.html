<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the T.E.A.M.S Initiative</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/responsive.css">
    <link rel="stylesheet" href="styles/registration.css">

</head>

<body>

<div class="container">

<h1>Join the T.E.A.M.S Initiative</h1>

<p class="subtitle">
Complete the registration form below to become part of our global mentorship community.
</p>

<form id="registrationForm">

<div class="grid">

<div>
<label>First Name</label>
<input type="text" name="first_name" required>
</div>

<div>
<label>Last Name</label>
<input type="text" name="last_name" required>
</div>

<div>
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div>
<label>Phone Number</label>
<input type="tel" name="phone" required>
</div>

<div>
<label>Country</label>
<input type="text" name="country" required>
</div>

<div>
<label>State / Province</label>
<input type="text" name="state" required>
</div>

<div>
<label>City</label>
<input type="text" name="city" required>
</div>

<div class="full">
<label>Residential Address</label>
<textarea name="address" required></textarea>
</div>

<div>
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div>
<label>Gender</label>

<select name="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Prefer not to say</option>
</select>

</div>

<div>
<label>Occupation</label>
<input type="text" name="occupation">
</div>

<div>
<label>Highest Education</label>

<select name="education">
<option>High School</option>
<option>Diploma</option>
<option>Bachelor's Degree</option>
<option>Master's Degree</option>
<option>Doctorate</option>
<option>Other</option>
</select>

</div>

<div class="full">

<label>Why do you want to join T.E.A.M.S?</label>

<textarea name="reason" required></textarea>

</div>

<div class="full checkbox">

<input type="checkbox" id="agree" required>

<label for="agree">
I certify that the information provided is true and accurate.
</label>

</div>

<div class="full">

<button type="submit">

Submit Registration

</button>

</div>

</div>

</form>

</div>

<script src="scripts/register.js"></script>
