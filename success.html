<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration Successful</title>

<link rel="stylesheet" href="styles/style.css">

<style>

body{

    font-family:Poppins,sans-serif;
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

}

.card{

    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.1);
    max-width:600px;

}

.code{

    margin:30px 0;
    background:#0A2540;
    color:white;
    padding:20px;
    border-radius:10px;
    font-size:28px;
    font-weight:bold;

}

.btn{

    display:inline-block;
    margin-top:20px;
    padding:14px 28px;
    background:#0066cc;
    color:white;
    text-decoration:none;
    border-radius:8px;

}

</style>

</head>

<body>

<div class="card">

<h1>Registration Successful</h1>

<p id="name"></p>

<div class="code" id="code"></div>

<a href="index.html" class="btn">

Return Home

</a>

</div>

<script>

document.getElementById("name").textContent =
"Thank you, " +
localStorage.getItem("applicantName") +
".";

document.getElementById("code").textContent =
localStorage.getItem("registrationCode");

</script>

</body>

</html>
